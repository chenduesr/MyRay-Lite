name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve and validate release version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH format: $tag"
          }

          $version = $Matches.version
          [xml]$project = Get-Content src/V2RayLite.App/V2RayLite.App.csproj -Raw
          $declaredVersion = [string]($project.Project.PropertyGroup.Version | Select-Object -First 1)
          if ($declaredVersion -ne $version) {
            throw "Tag version $version does not match project version $declaredVersion."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run core tests
        shell: pwsh
        run: dotnet run --project tests/V2RayLite.Core.Tests/V2RayLite.Core.Tests.csproj -c Release

      - name: Publish self-contained app
        shell: pwsh
        run: |
          dotnet publish src/V2RayLite.App/V2RayLite.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:NuGetAudit=false `
            -p:Version="$env:RELEASE_VERSION" `
            -o publish/MyRay-Lite-win-x64

      - name: Download Xray-core
        shell: pwsh
        run: |
          $headers = @{ "User-Agent" = "MyRayLite-release" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/XTLS/Xray-core/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match "windows-64.*\.zip$" } | Select-Object -First 1
          if (-not $asset) { throw "No Windows x64 Xray-core asset found." }
          New-Item -ItemType Directory -Force -Path publish/MyRay-Lite-win-x64/bin/xray | Out-Null
          $zip = Join-Path $env:TEMP "xray.zip"
          $extract = Join-Path $env:TEMP "xray"
          Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $extract -Force
          Get-ChildItem -Path $extract -Recurse -Include xray.exe,geoip.dat,geosite.dat |
            Copy-Item -Destination publish/MyRay-Lite-win-x64/bin/xray -Force

      - name: Sign published app if certificate is configured
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:SIGN_PFX_PASSWORD)) {
            Write-Host "Signing certificate secrets are not configured. Skipping app signing."
            exit 0
          }

          $pfx = Join-Path $env:TEMP "myray-lite-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found." }

          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGN_PFX_PASSWORD publish/MyRay-Lite-win-x64/MyRayLite.exe

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path publish/MyRay-Lite-win-x64/* `
            -DestinationPath "release/MyRay-Lite-${{ github.ref_name }}-win-x64.zip" `
            -CompressionLevel Optimal

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found." }
          & $iscc "/DMyAppVersion=$env:RELEASE_VERSION" installer/MyRay-Lite.iss

      - name: Sign installer if certificate is configured
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:SIGN_PFX_PASSWORD)) {
            Write-Host "Signing certificate secrets are not configured. Skipping installer signing."
            exit 0
          }

          $pfx = Join-Path $env:TEMP "myray-lite-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found." }

          foreach ($installer in Get-ChildItem release -Filter "*.exe") {
            & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGN_PFX_PASSWORD $installer.FullName
          }


      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $escapedTag = [regex]::Escape($tag)
          $changelog = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          $match = [regex]::Match($changelog, "(?ms)^##\s+$escapedTag\s*(?<body>.*?)(?=^##\s+|\z)")
          $changes = if ($match.Success) {
            $match.Groups["body"].Value.Trim()
          } else {
            "完整变更记录见 ``CHANGELOG.md``。"
          }

          $notes = @"
          ## MyRay Lite $tag

          Windows x64 版本，提供两种下载：

          - 便携版：下载 zip 后解压，运行 ``MyRayLite.exe``
          - 安装版：下载 Setup.exe，自动创建开始菜单快捷方式，可选择桌面快捷方式

          ### 本次变更

          $changes
          "@

          $notes = ($notes -split "`r?`n" | ForEach-Object { $_.TrimStart() }) -join "`n"

          Set-Content -LiteralPath RELEASE_NOTES.md -Value $notes -Encoding UTF8

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MyRay Lite ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: |
            release/*.zip
            release/*.exe
